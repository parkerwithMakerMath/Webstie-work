<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parker Doerr</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f4ff;
        color: #1e1b4b;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Header ── */
      header {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid #e5e3f8;
        padding: 0 2.5rem;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 1px 12px rgba(99, 91, 255, 0.06);
      }

      header .logo {
        font-size: 1.1rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: #4f46e5;
        text-decoration: none;
      }

      header nav {
        display: flex;
        align-items: center;
        gap: 0.35rem;
      }

      header nav a {
        color: #6b7280;
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 500;
        padding: 0.4rem 0.9rem;
        border-radius: 999px;
        transition: background 0.18s, color 0.18s;
      }

      header nav a:hover {
        background: #ede9fe;
        color: #4f46e5;
      }

      header nav a.active {
        background: #ede9fe;
        color: #4f46e5;
        font-weight: 600;
      }

      /* ── Hero ── */
      .hero {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 7rem 2rem 6rem;
        background:
          radial-gradient(ellipse 60% 50% at 50% -10%, rgba(99, 91, 255, 0.12) 0%, transparent 70%),
          radial-gradient(ellipse 40% 30% at 80% 80%, rgba(167, 139, 250, 0.08) 0%, transparent 60%);
      }

      .hero .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        background: #ede9fe;
        color: #5b21b6;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 0.4rem 1rem;
        border-radius: 999px;
        margin-bottom: 1.75rem;
        border: 1px solid #ddd6fe;
      }

      .hero h1 {
        font-size: clamp(2.8rem, 7vw, 5rem);
        font-weight: 900;
        line-height: 1.05;
        letter-spacing: -0.04em;
        color: #1e1b4b;
        margin-bottom: 1.25rem;
      }

      .hero h1 span {
        background: linear-gradient(135deg, #6366f1, #a855f7);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .hero p {
        max-width: 480px;
        font-size: 1.1rem;
        color: #6b7280;
        line-height: 1.75;
        margin-bottom: 2.5rem;
      }

      .btn-primary {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: #fff;
        text-decoration: none;
        font-weight: 700;
        font-size: 0.95rem;
        padding: 0.8rem 2rem;
        border-radius: 999px;
        box-shadow: 0 4px 18px rgba(99, 91, 255, 0.35);
        transition: box-shadow 0.2s, transform 0.15s;
        letter-spacing: 0.01em;
      }

      .btn-primary:hover {
        box-shadow: 0 6px 24px rgba(99, 91, 255, 0.45);
        transform: translateY(-2px);
      }

      /* ── Footer ── */
      footer {
        background: #fff;
        border-top: 1px solid #e5e3f8;
        padding: 1.5rem 2.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 0.75rem;
        font-size: 0.82rem;
        color: #9ca3af;
      }

      footer a {
        color: #9ca3af;
        text-decoration: none;
        transition: color 0.2s;
      }

      footer a:hover { color: #6366f1; }

      footer .links { display: flex; gap: 1.5rem; }
    </style>
  </head>
  <body>

    <header>
      <a class="logo" href="index.html">Parker Doerr</a>
      <nav>
        <a href="index.html" class="active">About</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <section class="hero">
      <span class="badge">&#10024; Welcome</span>
      <h1>Hi, I'm <span>Parker Doerr</span></h1>
      <p>Building things on the web. This site is just getting started — more coming soon.</p>
      <a class="btn-primary" href="contact.html">Get in touch &rarr;</a>
    </section>

    <footer>
      <span>&copy; 2026 Parker Doerr</span>
      <div class="links">
        <a href="index.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html">Contact</a>
      </div>
    </footer>

  </body>
</html>
