<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parker Doerr</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0c0c14;
        color: #e4e4f0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Header ── */
      header {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(12, 12, 20, 0.88);
        backdrop-filter: blur(14px);
        border-bottom: 1px solid #222236;
        padding: 0 2.5rem;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 1px 16px rgba(0, 0, 0, 0.4);
      }

      header .logo {
        font-size: 1.1rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: #818cf8;
        text-decoration: none;
      }

      header nav {
        display: flex;
        align-items: center;
        gap: 0.35rem;
      }

      header nav a {
        color: #8888aa;
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 500;
        padding: 0.4rem 0.9rem;
        border-radius: 999px;
        transition: background 0.18s, color 0.18s;
      }

      header nav a:hover {
        background: rgba(129, 140, 248, 0.12);
        color: #a5b4fc;
      }

      header nav a.active {
        background: rgba(129, 140, 248, 0.15);
        color: #a5b4fc;
        font-weight: 600;
      }

      /* ── Hero ── */
      .hero {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 7rem 2rem 6rem;
        background:
          radial-gradient(ellipse 60% 50% at 50% -10%, rgba(99, 91, 255, 0.18) 0%, transparent 70%),
          radial-gradient(ellipse 40% 30% at 80% 80%, rgba(167, 139, 250, 0.1) 0%, transparent 60%);
      }

      .hero .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        background: rgba(99, 102, 241, 0.15);
        color: #a5b4fc;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 0.4rem 1rem;
        border-radius: 999px;
        margin-bottom: 1.75rem;
        border: 1px solid rgba(99, 102, 241, 0.3);
      }

      .hero h1 {
        font-size: clamp(2.8rem, 7vw, 5rem);
        font-weight: 900;
        line-height: 1.05;
        letter-spacing: -0.04em;
        color: #e4e4f0;
        margin-bottom: 1.25rem;
      }

      .hero h1 span {
        background: linear-gradient(135deg, #818cf8, #c084fc);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .hero p {
        max-width: 480px;
        font-size: 1.1rem;
        color: #8888aa;
        line-height: 1.75;
        margin-bottom: 2.5rem;
      }

      .btn-row {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        justify-content: center;
      }

      .btn-primary {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: #fff;
        text-decoration: none;
        font-weight: 700;
        font-size: 0.95rem;
        padding: 0.8rem 2rem;
        border-radius: 999px;
        box-shadow: 0 4px 22px rgba(99, 91, 255, 0.45);
        transition: box-shadow 0.2s, transform 0.15s;
        letter-spacing: 0.01em;
      }

      .btn-primary:hover {
        box-shadow: 0 6px 30px rgba(99, 91, 255, 0.6);
        transform: translateY(-2px);
      }

      .btn-secondary {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: transparent;
        color: #a5b4fc;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.95rem;
        padding: 0.8rem 2rem;
        border-radius: 999px;
        border: 1.5px solid rgba(129, 140, 248, 0.35);
        transition: background 0.2s, border-color 0.2s, transform 0.15s;
        letter-spacing: 0.01em;
      }

      .btn-secondary:hover {
        background: rgba(129, 140, 248, 0.1);
        border-color: rgba(129, 140, 248, 0.6);
        transform: translateY(-2px);
      }

      /* ── Footer ── */
      footer {
        background: #0a0a12;
        border-top: 1px solid #222236;
        padding: 1.5rem 2.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 0.75rem;
        font-size: 0.82rem;
        color: #55556a;
      }

      footer a {
        color: #55556a;
        text-decoration: none;
        transition: color 0.2s;
      }

      footer a:hover { color: #818cf8; }
      footer .links { display: flex; gap: 1.5rem; }
    </style>
  </head>
  <body>

    <header>
      <a class="logo" href="index.html">Parker Doerr</a>
      <nav>
        <a href="index.html" class="active">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <section class="hero">
      <span class="badge">&#10024; Welcome</span>
      <h1>Hi, I'm <span>Parker Doerr</span></h1>
      <p>Software developer, math enthusiast, and builder of things on the web. Always learning, always shipping.</p>
      <div class="btn-row">
        <a class="btn-primary" href="projects.html">View my work &rarr;</a>
        <a class="btn-secondary" href="about.html">About me</a>
      </div>
    </section>

    <footer>
      <span>&copy; 2026 Parker Doerr</span>
      <div class="links">
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html">Contact</a>
      </div>
    </footer>

  </body>
</html>
